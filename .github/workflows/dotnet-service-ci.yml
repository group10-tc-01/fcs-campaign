# repos renamed: fcg -> fcs
name: fcs.Campaign CI

on:
  pull_request:
    branches: [main]
    paths:
      - src/**
      - tests/**
      - Directory.Build.props
      - Directory.Packages.props
      - .editorconfig
      - docker-compose.yml
      - .github/workflows/dotnet-service-ci.yml
  push:
    branches: [main]
    paths:
      - src/**
      - tests/**
      - Directory.Build.props
      - Directory.Packages.props
      - .editorconfig
      - docker-compose.yml
      - .github/workflows/dotnet-service-ci.yml
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write
  security-events: write

jobs:
  ci:
    uses: group10-tc-01/fcs-pipelines/.github/workflows/dotnet-service-ci.yml@main
    with:
      service_name: fcs-campaign
      dotnet_version: 8.0.x
       solution_path: Fcs.Campaign.slnx
       unit_tests_path: tests/Fcs.Campaign.UnitTests/Fcs.Campaign.UnitTests.csproj
       integration_tests_path: tests/Fcs.Campaign.IntegratedTests/Fcs.Campaign.IntegratedTests.csproj
      test_environment: Test
      coverage_threshold: 80
      run_sonar: true
      sonar_project_key: group10-tc-01_fcs-campaign
      sonar_organization: group10-tc-01
      dockerfile_path: src/fcs.Campaign.WebApi/Dockerfile
      docker_context: .
    secrets: inherit
