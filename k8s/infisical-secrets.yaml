apiVersion: secrets.infisical.com/v1beta1
kind: InfisicalStaticSecret
metadata:
  name: campaign-runtime
  namespace: fcs-campaigns
spec:
  infisicalAuthRef:
    name: fcs-platform-auth
    namespace: infisical-operator-system
  syncOptions:
    refreshInterval: 5m
    instantUpdates: false
  sources:
    - projectSlug: fcs-platform-dd-uk
      environmentSlug: prod
      secretPath: /platform
  targets:
    - name: campaign-runtime
      namespace: fcs-campaigns
      kind: Secret
      creationPolicy: Owner
      template:
        engineVersion: v1
        data:
          ConnectionStrings__SqlServer: 'Server=sqlserver-service.fcs-infra.svc.cluster.local,1433;Database=CampaignsDb;User Id=sa;Password={{ secretFrom "/platform" "sql-sa-password" }};Encrypt=False;TrustServerCertificate=True'
